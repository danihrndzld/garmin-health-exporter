<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garmin Data Exporter</title>
<!--
  Fonts are served from bundled WOFF2 files in renderer/fonts/.
  Run `npm run fonts` once to download them. The Google Fonts fallback below
  is only used if the local files are missing (e.g. fresh clone before running
  the download script).
-->
<link rel="stylesheet" href="renderer.css">
<!-- Online fallback: only activates when local WOFF2 files are absent -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400&family=Barlow+Condensed:wght@700&display=swap" media="print" onload="this.media='all'">
<script src="renderer.js" defer></script>
</head>
<body>

<div id="app">

  <!-- Titlebar -->
  <div id="titlebar">
    <div class="logo-mark">
      <div class="logo-pulse"></div>
      <svg viewBox="0 0 32 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 10 L6 10 L9 4 L12 16 L15 7 L17 10 L31 10" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span id="title-text">Garmin Data Exporter</span>
    <div class="title-divider"></div>
    <span class="title-sub">Health Sync</span>
    <div class="tb-right">
      <button id="update-btn" title="Check for updates">v<span id="app-version">…</span></button>
      <div class="status-pill" id="status-pill">
        <div id="status-dot"></div>
        <span id="status-label" aria-live="polite">OFFLINE</span>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Sidebar -->
    <div id="sidebar">

      <form id="creds-form" novalidate>
        <div class="section">
          <div class="section-title">Credentials <span class="section-num" aria-hidden="true">01</span></div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="username" spellcheck="false">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <div class="eye-wrap">
              <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
              <button type="button" class="eye-btn" id="eye-btn" aria-label="Show password">
                <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12 C5 6, 10 4, 12 4 C14 4, 19 6, 22 12 C19 18, 14 20, 12 20 C10 20, 5 18, 2 12 Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true" hidden>
                  <path d="M2 12 C5 6, 10 4, 12 4 C14 4, 19 6, 22 12 C19 18, 14 20, 12 20 C10 20, 5 18, 2 12 Z"/>
                  <path d="M4 4 L20 20"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Date Range <span class="section-num" aria-hidden="true">02</span></div>
          <div class="slider-row">
            <input type="range" id="days-slider" min="1" max="90" value="7"
              aria-label="Days to export" aria-valuenow="7" aria-valuetext="7 days">
            <span class="slider-val" id="days-val">7</span>
            <span class="slider-unit">days</span>
          </div>
          <div class="field" style="margin-top:10px;">
            <label for="refresh-window" title="Days to always re-fetch from Garmin (captures retroactive updates)">Refresh window</label>
            <select id="refresh-window" title="Days to always re-fetch from Garmin (captures retroactive updates)">
              <option value="1">1 day</option>
              <option value="2">2 days</option>
              <option value="3" selected>3 days</option>
              <option value="5">5 days</option>
              <option value="7">7 days</option>
            </select>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Output <span class="section-num" aria-hidden="true">03</span></div>
          <div class="dir-row">
            <span class="dir-path" id="dir-display">~/Documents/GarminExport</span>
            <button type="button" class="btn btn-secondary btn-sm" id="choose-dir-btn" aria-label="Choose output directory">…</button>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Export <span class="section-num" aria-hidden="true">04</span></div>
          <button type="submit" class="btn btn-primary btn-full" id="btn-health">Download Health Data</button>
          <div style="text-align:center; margin-top:8px;">
            <button type="button" class="cache-link" id="clear-cache-btn">Clear cache</button>
          </div>
        </div>
      </form>

      <div class="section" id="open-section" style="display:none;">
        <div class="section-title">Last Output</div>
        <button class="btn btn-secondary btn-sm btn-full" id="open-folder-btn">Open in Finder →</button>
      </div>

    </div>

    <!-- Terminal -->
    <div id="terminal-panel">

      <div id="terminal-header">
        <span id="terminal-title">System Output</span>
        <div class="terminal-actions">
          <button class="btn btn-secondary btn-sm" id="bug-report-btn" title="Send a bug report with logs to the maintainer">Send bug report</button>
          <button class="btn btn-secondary btn-sm" id="clear-btn">Clear</button>
        </div>
      </div>

      <div id="progress-wrap">
        <div id="progress-label">
          <span id="progress-phase">Processing…</span>
          <span id="progress-pct" aria-hidden="true">0%</span>
        </div>
        <div id="progress-track">
          <div id="progress-fill"
            role="progressbar"
            aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
            aria-label="Export progress"></div>
        </div>
      </div>

      <div id="result-banner" role="alert" aria-atomic="true"></div>

      <div id="log" aria-live="polite" aria-relevant="additions" aria-label="Export log output">
        <div id="welcome">
          <svg class="w-ecg" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 18 L18 18 L26 4 L34 32 L42 12 L48 18 L120 18"/>
          </svg>
          <div class="w-title">Ready</div>
          <div class="w-sub">Enter credentials and choose an action</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <div class="sb-item">SYS <span id="sb-status">IDLE</span></div>
    <span class="sb-sep">·</span>
    <div class="sb-item">v<span id="sb-version">…</span></div>
    <div id="sb-last" title="Click to open" role="button" tabindex="0" aria-label="Open last output folder"></div>
  </div>

</div>

</body>
</html>
